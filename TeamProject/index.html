<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gadget Catalog</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Favicon -->
    <link rel="icon" href="img/main_image.png?v=2" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <!-- Logo -->
        <a class="navbar-brand" href="#home"> GadgetHub </a>

        <!-- Burger -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          ☰
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="nav">
          <!-- Navigation -->
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#home"> Головна </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#catalog"> Каталог </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#game"> Гра </a>
            </li>
          </ul>

          <!-- Sort -->
          <select
            id="sortSelect"
            class="form-select ms-3"
            onchange="sortItems()"
            style="max-width: 220px"
          >
            <option value="default">Без сортування</option>

            <option value="priceAsc">Ціна ↑</option>

            <option value="priceDesc">Ціна ↓</option>

            <option value="favorites">❤️ Обрані товари</option>
          </select>

          <!-- Search -->
          <div id="searchForm" class="d-flex ms-3">
            <input
              class="form-control"
              type="search"
              placeholder="Пошук..."
              id="searchInput"
              oninput="searchItems()"
            />
          </div>

          <!-- Theme -->
          <button
            class="btn btn-sm btn-outline-light ms-3"
            onclick="toggleTheme()"
          >
            🌙
          </button>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <div class="container mt-4 flex-grow-1">
      <!-- SPA Content -->
      <div id="app"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-4 mt-5">
      <p class="mb-1">© 2026 GadgetHub</p>

      <p class="mb-1">Навчальний проєкт з Web-програмування</p>

      <p class="mb-1">Фаїк Андрій</p>

      <p class="mb-1">Прохира Оксана</p>

      <p class="mb-1">Чичул Денис</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
